name: Daily Steam Picks Update

on:
  schedule:
    # 每天北京时间 10:00 (UTC 02:00) 更新
    - cron: '0 2 * * *'
  workflow_dispatch: # 支持手动触发

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Fetch Steam Data & Generate Site
        run: go run main.go

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "🎮 更新每日精选 $(date +'%Y-%m-%d')"
          git push
